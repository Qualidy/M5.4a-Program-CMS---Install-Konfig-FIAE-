title: Beteiligte im dualen System
difficulty: 1
question: |
  Ordne die folgenden Beteiligten ihrer Hauptaufgabe im dualen System zu.

  **Beteiligte:** Ausbildungsbetrieb, Berufsschule/Bildungsträger, IHK, Auszubildende Person, Ausbilder

  Erstelle eine Tabelle mit den Spalten:
  - Beteiligter
  - Hauptaufgabe (1–2 Sätze)
tip: |
  Denke an die zwei Lernorte und die prüfende/beratende Stelle.
solution: |
  Mögliche Lösung:

  | Beteiligter | Hauptaufgabe |
  |-------------|--------------|
  | Ausbildungsbetrieb | Vermittelt betriebliche Praxis, stellt Arbeitsplatz und Ausbilder |
  | Berufsschule/Bildungsträger | Unterrichtet theoretische und berufsbezogene Inhalte |
  | IHK | Prüft Betriebe, führt Abschlussprüfung durch, berät |
  | Auszubildende Person | Lernt berufliche Handlungsfähigkeit, erfüllt Pflichten |
  | Ausbilder | Plant und leitet die betriebliche Ausbildung |
