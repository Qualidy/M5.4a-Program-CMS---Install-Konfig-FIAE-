title: Sozialversicherung – Umschüler vs. Azubi
difficulty: 2
question: |
  Vergleiche die **Sozialversicherungssituation** in zwei Konstellationen:

  1. Umschüler beim Bildungsträger (Unterricht + unbezahltes Praktikum)
  2. Regulärer Azubi mit Ausbildungsvertrag und Ausbildungsvergütung

  Tabelle: Konstellation | Krankenversicherung | Rentenversicherung | Besonderheiten
tip: |
  Nur ein Beschäftigungsverhältnis (Azubi) löst eigene SV-Pflicht aus. Das Umschüler-Praktikum ist unbezahlt.
solution: |
  Umschüler: keine SV aus Beschäftigung; KV/PV/RV bei ALG-I-Bezug über die Agentur (die Agentur zahlt auch RV-Beiträge); Praktikum unbezahlt, keine Ausbildungsvergütung.
  Azubi: pflichtversichert in allen fünf Zweigen; Beiträge von AG und AN geteilt (unter Geringverdienergrenze AG allein); UV über den Betrieb, auch in Berufsschulzeiten.
