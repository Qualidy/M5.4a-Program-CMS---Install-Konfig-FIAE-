title: Ordnung, Plan und Rahmenlehrplan
difficulty: 1
question: |
  Erkläre in je **2–3 Sätzen** den Unterschied zwischen:

  1. Ausbildungsordnung
  2. Betrieblicher Ausbildungsplan (BAP)
  3. Rahmenlehrplan
tip: |
  Wer erstellt was, und für welchen Lernort gilt es?
solution: |
  Ausbildungsordnung: vom Staat/BIBB, definiert Mindestinhalte und Prüfung für alle Betriebe.
  BAP: vom Betrieb, legt konkret fest wann/wer was im Betrieb vermittelt.
  Rahmenlehrplan: für Berufsschule/Bildungsträger, Unterrichtsinhalte.
