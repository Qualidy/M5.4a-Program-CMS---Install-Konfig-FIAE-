title: Vier Fachrichtungen vergleichen
difficulty: 2
question: |
  Erstelle eine Tabelle mit allen **vier Fachrichtungen** des Fachinformatikers (FIAusbV):

  | Fachrichtung | Kurz | 2 typische Tätigkeiten | Typischer Betrieb |
  |--------------|------|-------------------------|-------------------|

  Fülle die Tabelle vollständig aus.
tip: |
  Die vier Fachrichtungen seit 2020: AE, SI, Daten- und Prozessanalyse (DPA), Digitale Vernetzung (DV).
solution: |
  | Fachrichtung | Kurz | Tätigkeiten | Betrieb |
  |--------------|------|-------------|---------|
  | Anwendungsentwicklung | AE | Software entwickeln, Qualität prüfen | Softwarehaus, Agentur |
  | Systemintegration | SI | Netzwerke, Server administrieren | IT-Dienstleister, Rechenzentrum |
  | Daten- und Prozessanalyse | DPA | Prozesse/Daten analysieren, optimieren | Beratung, Industrie mit BI |
  | Digitale Vernetzung | DV | IoT-Systeme planen und betreiben | Produktion, Logistik, Industrie 4.0 |
