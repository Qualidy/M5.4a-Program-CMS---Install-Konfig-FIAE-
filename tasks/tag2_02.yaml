title: Rechte und Pflichten
difficulty: 2
question: |
  Erstelle zwei Tabellen:

  **Tabelle 1:** Mindestens 5 **Rechte** der Auszubildenden Person
  **Tabelle 2:** Mindestens 5 **Pflichten** der Auszubildenden Person

  Kennzeichne mit einem Stern (*) das Recht bzw. die Pflicht, die für die **Abschlussprüfung** besonders wichtig ist.
tip: |
  Berichtsheft und Berufsschulpflicht sind prüfungsrelevant.
solution: |
  Rechte: Ausbildung, Vergütung, Berufsschule, Urlaub, Zeugnis, JAV-Mitbestimmung.
  Pflichten: Lernpflicht, Anweisungen befolgen, Sorgfalt, Schweigepflicht, Berufsschule, Berichtsheft (*).
